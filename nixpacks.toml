[phases.setup]
  nixPkgs = ['php82', 'nodejs-20_x', 'chromium']

[phases.build]
  cmds = ['npm ci', 'npx puppeteer browsers install chrome', 'composer install --no-dev', 'php artisan config:cache']

[phases.deploy]
  cmds = ['php artisan serve --host=0.0.0.0 --port=$PORT']

[staticAssets]
  mountPath = '/public'
